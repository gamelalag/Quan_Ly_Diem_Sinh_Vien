<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Điểm Sinh Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4 text-center">CHI TIẾT ĐIỂM SINH VIÊN</h2>

    <div class="card mb-4 shadow-sm border-info">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h4 class="card-title text-uppercase text-info" th:text="${sinhVien.hoTen}">Tên Sinh Viên</h4>
                    <p class="card-text mb-1"><strong>Mã SV:</strong> <span th:text="${sinhVien.maSV}"></span></p>
                    <p class="card-text"><strong>Email:</strong> <span th:text="${sinhVien.email}"></span></p>
                </div>

                <div class="col-md-4 text-end">
                    <div class="p-3 bg-light rounded border shadow-sm text-center">
                        <div class="row mb-2">
                            <div class="col-6 border-end">
                                <span class="d-block text-muted small fw-bold">HỆ 10</span>
                                <h4 class="text-primary mb-0" th:text="${gpa10}">0.00</h4>
                            </div>
                            <div class="col-6">
                                <span class="d-block text-muted small fw-bold">HỆ 4.0</span>
                                <h4 class="text-danger mb-0" th:text="${gpa4}">0.00</h4>
                            </div>
                        </div>
                        <hr class="my-2">
                        <div class="fw-bold">
                            Xếp loại:
                            <span th:text="${xepLoai}"
                                  th:classappend="${gpa4 >= 3.2 ? 'text-success' : (gpa4 >= 2.5 ? 'text-primary' : (gpa4 >= 2.0 ? 'text-warning' : 'text-danger'))}">
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-3">
        <a th:href="@{/sinh-vien}" class="btn btn-secondary">&laquo; Quay lại danh sách</a>
    </div>

    <div th:if="${not #lists.isEmpty(listDiem)}">
        <table class="table table-bordered table-hover text-center align-middle shadow-sm">
            <thead class="table-dark">
            <tr>
                <th style="width: 10%;">STT</th>
                <th style="width: 60%;">Tên Môn Học</th>
                <th style="width: 30%;">Điểm Số</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="diem, iterStat : ${listDiem}">
                <td th:text="${iterStat.count}">1</td>
                <td th:text="${diem.monHoc.tenMon}" class="text-start ps-4">Tên Môn</td>
                <td th:text="${diem.diemSo}" class="fw-bold fs-5 text-primary">0.0</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${#lists.isEmpty(listDiem)}" class="alert alert-warning text-center shadow-sm">
        <i class="fs-5">Sinh viên này chưa được cập nhật điểm môn học nào!</i>
    </div>

</div>
</body>
</html>
