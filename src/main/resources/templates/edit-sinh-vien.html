<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa thông tin Sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-6">
        <h3>Cập nhật thông tin Sinh viên</h3>
        <form th:action="@{/sinh-vien/save}" th:object="${sinhVien}" method="post" class="mt-4">

            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Mã Sinh viên:</label>
                <input type="text" th:field="*{maSV}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Họ Tên:</label>
                <input type="text" th:field="*{hoTen}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email:</label>
                <input type="email" th:field="*{email}" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">Cập nhật</button>
            <a th:href="@{/sinh-vien}" class="btn btn-secondary">Hủy</a>
        </form>
    </div>
</div>
</body>
</html>
