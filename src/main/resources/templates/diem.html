<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Điểm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<nav class="mb-4">
    <a th:href="@{/sinh-vien}" class="btn btn-outline-secondary">Sinh viên</a>
    <a th:href="@{/mon-hoc}" class="btn btn-outline-secondary">Môn học</a>
    <a th:href="@{/diem}" class="btn btn-primary">Quản lý Điểm</a>
</nav>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Danh sách Điểm số</h2>
    <a th:href="@{/diem/add}" class="btn btn-success">Nhập điểm mới</a>
</div>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Mã SV</th>
        <th>Họ Tên</th>
        <th>Tên Môn</th>
        <th>Điểm Số</th>
        <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="d : ${listDiem}">
        <td th:text="${d.id}"></td>
        <td th:text="${d.sinhVien.maSV}"></td>
        <td th:text="${d.sinhVien.hoTen}"></td>
        <td th:text="${d.monHoc.tenMon}"></td>
        <td th:text="${d.diemSo}"></td>
        <td>
            <a th:href="@{'/diem/delete/' + ${d.id}}" class="btn btn-danger btn-sm" onclick="return confirm('Xóa điểm này?')">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
