<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Môn học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-6">
        <h3>Thêm mới Môn học</h3>
        <form th:action="@{/mon-hoc/save}" th:object="${monHoc}" method="post" class="mt-4">
            <div class="mb-3">
                <label class="form-label">Mã Môn học:</label>
                <input type="text" th:field="*{maMon}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Tên Môn học:</label>
                <input type="text" th:field="*{tenMon}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Số Tín chỉ:</label>
                <input type="number" th:field="*{soTinChi}" class="form-control" required min="1">
            </div>
            <button type="submit" class="btn btn-success">Lưu dữ liệu</button>
            <a th:href="@{/mon-hoc}" class="btn btn-secondary">Hủy</a>
        </form>
    </div>
</div>
</body>
</html>
