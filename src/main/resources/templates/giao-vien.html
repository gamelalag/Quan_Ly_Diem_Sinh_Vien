<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Giáo Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white text-center">
            <h2 class="mb-0">DANH SÁCH GIÁO VIÊN</h2>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <a th:href="@{/giao-vien/add}" class="btn btn-success">
                    <i class="fas fa-user-plus"></i> Thêm Giáo Viên Mới
                </a>
                <a th:href="@{/sinh-vien}" class="btn btn-secondary ms-2">Quản lý Sinh Viên</a>
            </div>

            <table class="table table-bordered table-hover text-center align-middle">
                <thead class="table-secondary">
                <tr>
                    <th>Mã GV</th>
                    <th>Họ Tên</th>
                    <th>Chuyên Môn</th>
                    <th>Email</th>
                    <th>Số Điện Thoại</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="gv : ${listGV}">
                    <td th:text="${gv.maGV}" class="fw-bold"></td>
                    <td th:text="${gv.hoTen}" class="text-start"></td>
                    <td th:text="${gv.chuyenMon}"></td>
                    <td th:text="${gv.email}"></td>
                    <td th:text="${gv.soDienThoai}"></td>
                    <td>
                        <a th:href="@{/giao-vien/edit/{id}(id=${gv.id})}" class="btn btn-warning btn-sm text-white">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a th:href="@{/giao-vien/delete/{id}(id=${gv.id})}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Xóa giáo viên này?');">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
