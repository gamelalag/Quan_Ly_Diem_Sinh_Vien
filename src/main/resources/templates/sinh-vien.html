<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sinh Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h2 class="mb-0 text-center text-uppercase">Hệ Thống Quản lý Sinh Viên</h2>
        </div>
        <div class="card-body">

            <div class="row mb-4">
                <div class="col-md-6">
                    <a th:href="@{/sinh-vien/add}" class="btn btn-success">
                        <i class="fas fa-plus"></i> Thêm Sinh Viên
                    </a>
                    <a th:href="@{/diem/them-moi}" class="btn btn-warning text-white ms-2">
                        <i class="fas fa-edit"></i> Nhập Điểm Môn Học
                    </a>
                </div>
                <div class="col-md-6">
                    <form th:action="@{/sinh-vien}" method="get" class="d-flex">
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control me-2"
                               placeholder="Tìm theo tên hoặc mã SV...">
                        <button type="submit" class="btn btn-outline-primary">Tìm</button>
                        <a th:href="@{/sinh-vien}" class="btn btn-outline-secondary ms-2">Reset</a>
                    </form>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle text-center">
                    <thead class="table-dark">
                    <tr>
                        <th style="width: 5%">ID</th>
                        <th style="width: 15%">Mã SV</th>
                        <th style="width: 30%">Họ Tên</th>
                        <th style="width: 25%">Email</th>
                        <th style="width: 25%">Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="sv : ${listSV}">
                        <td th:text="${sv.id}"></td>
                        <td th:text="${sv.maSV}" class="fw-bold text-primary"></td>
                        <td class="text-start ps-3" th:text="${sv.hoTen}"></td>
                        <td th:text="${sv.email}"></td>
                        <td>
                            <a th:href="@{/sinh-vien/chi-tiet/{id}(id=${sv.id})}"
                               class="btn btn-info btn-sm text-white" title="Xem bảng điểm và GPA">
                                <i class="fas fa-eye"></i> Xem Điểm
                            </a>

                            <a th:href="@{/sinh-vien/edit/{id}(id=${sv.id})}"
                               class="btn btn-warning btn-sm text-white" title="Sửa thông tin">
                                <i class="fas fa-user-edit"></i>
                            </a>

                            <a th:href="@{/sinh-vien/delete/{id}(id=${sv.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Bạn có chắc chắn muốn xóa sinh viên này và mọi dữ liệu liên quan?');">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${listSV == null or #lists.isEmpty(listSV)}">
                        <td colspan="5" class="py-4 text-danger fw-bold fs-5">
                            <i class="fas fa-search"></i> Không tìm thấy sinh viên nào phù hợp!
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${totalPages != null and totalPages > 0}"
                 class="d-flex justify-content-between align-items-center mt-4 border-top pt-3">
                <div>
                    Trang <span class="badge bg-primary" th:text="${currentPage}">1</span>
                    trên tổng số <span class="badge bg-secondary" th:text="${totalPages}">1</span>
                </div>

                <nav aria-label="Page navigation">
                    <ul class="pagination mb-0">
                        <li class="page-item" th:classappend="${currentPage <= 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/sinh-vien(pageNo=${currentPage - 1}, keyword=${keyword})}">
                                &laquo;
                            </a>
                        </li>

                        <li th:each="i : ${#numbers.sequence(1, totalPages)}" class="page-item"
                            th:classappend="${currentPage == i ? 'active' : ''}">
                            <a class="page-link" th:href="@{/sinh-vien(pageNo=${i}, keyword=${keyword})}" th:text="${i}"></a>
                        </li>

                        <li class="page-item" th:classappend="${currentPage >= totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/sinh-vien(pageNo=${currentPage + 1}, keyword=${keyword})}">
                                &raquo;
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
        <div class="card-footer text-muted text-center small">
            Hệ thống quản lý nội bộ &copy; 2026
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
