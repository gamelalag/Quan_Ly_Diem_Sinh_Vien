<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Giáo Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">NHẬP THÔNG TIN GIÁO VIÊN</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/giao-vien/save}" th:object="${giaoVien}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <div class="mb-3">
                            <label class="form-label">Mã Giáo Viên</label>
                            <input type="text" th:field="*{maGV}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Họ và Tên</label>
                            <input type="text" th:field="*{hoTen}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Chuyên Môn</label>
                            <input type="text" th:field="*{chuyenMon}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số Điện Thoại</label>
                            <input type="text" th:field="*{soDienThoai}" class="form-control">
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary px-4">Lưu Lại</button>
                            <a th:href="@{/giao-vien}" class="btn btn-secondary px-4">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
